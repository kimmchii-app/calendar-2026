<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <!-- calendar build v2.0.1 (semver: MAJOR.MINOR.PATCH) -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 · 2027 照片月曆 · 設計版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Caveat:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;600&display=swap');
  :root{
    --bg:#ECEEEA; --card:#FFFFFF; --ink:#232A2E; --muted:#6B7670; --line:#DBDED6;
    --jade:#0F8A6B; --jade-soft:#E2F0EA; --sun:#C9483A; --sat:#2F6DB0;
    --world:#7A47CE; --tech:#0B7C8C; --fun:#D6457F; --trad:#B5710F;
    --sidebar:#232A2E; --sidebar-line:#3A434A; --sidebar-muted:#9AA6A2;
    --display:"Bricolage Grotesque",system-ui,sans-serif;
    --ui:system-ui,-apple-system,"Segoe UI","Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
    --radius:14px; --shadow:0 1px 2px rgba(35,42,46,.06),0 14px 36px rgba(35,42,46,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--ui);background:var(--bg);color:var(--ink);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased}

  .sidebar{width:200px;flex:0 0 200px;background:var(--sidebar);color:#fff;padding:26px 18px 22px;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100vh}
  .brand .eyebrow{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--sidebar-muted);margin-bottom:2px}
  .brand .year{font-family:var(--display);font-weight:800;font-size:48px;line-height:.9;letter-spacing:-.02em}
  .year-switch{display:flex;gap:6px}
  .year-tab{flex:1;font-family:var(--ui);font-size:13px;padding:8px 6px;background:transparent;color:#D7DCD9;border:1px solid var(--sidebar-line);border-radius:9px;cursor:pointer;transition:.15s;letter-spacing:.02em}
  .year-tab:hover{border-color:#5a6770;color:#fff}
  .year-tab.active{background:var(--jade);border-color:var(--jade);color:#fff;font-weight:700}
  .months{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .month-btn{font-family:var(--ui);font-size:13.5px;color:#D7DCD9;background:transparent;border:1px solid var(--sidebar-line);border-radius:9px;padding:9px 6px;cursor:pointer;transition:.15s}
  .month-btn:hover{border-color:#5a6770;color:#fff}
  .month-btn.active{background:var(--jade);border-color:var(--jade);color:#fff;font-weight:700}
  .month-btn .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#E4A11B;margin-left:4px;vertical-align:middle;opacity:0}
  .month-btn.filled .dot{opacity:1}
  .sidebar .tip{margin-top:auto;font-size:11px;line-height:1.6;color:var(--sidebar-muted);border-top:1px solid var(--sidebar-line);padding-top:14px}

  .center{flex:1;min-width:0;padding:34px 28px;display:flex;align-items:center;justify-content:center;overflow:auto}
  .stage{display:flex;justify-content:center;align-items:center;width:100%}

  .controls{width:322px;flex:0 0 322px;height:100vh;position:sticky;top:0;overflow-y:auto;background:var(--card);border-left:1px solid var(--line);padding:24px 20px 40px;display:flex;flex-direction:column;gap:18px}
  .grp{display:flex;flex-direction:column;gap:9px}
  .glabel{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
  .glabel small{text-transform:none;letter-spacing:0;font-size:10px;opacity:.85}
  .glabel em{font-style:normal;color:var(--jade);font-weight:700}
  .layout-row{display:flex;gap:7px;flex-wrap:wrap}
  .layout-btn{width:50px;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:6px 5px 5px;cursor:pointer;text-align:center;transition:.15s}
  .layout-btn:hover{border-color:#b9bfb6;transform:translateY(-1px)}
  .layout-btn.active{border-color:var(--jade);box-shadow:0 0 0 3px var(--jade-soft)}
  .layout-btn svg{display:block;width:100%;height:auto}
  .layout-btn .name{font-size:9.5px;margin-top:4px;color:var(--ink);line-height:1.15}
  .layout-btn.active .name{color:var(--jade);font-weight:700}
  .btn{font-family:var(--ui);font-size:14px;padding:12px 16px;border-radius:11px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;transition:.15s;white-space:nowrap;width:100%}
  .btn:hover{border-color:#b9bfb6}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.primary{background:var(--jade);border-color:var(--jade);color:#fff;font-weight:600}
  .btn.primary:hover{background:#0c7459}
  .seg{display:inline-flex;border:1.5px solid var(--line);border-radius:9px;overflow:hidden;width:max-content;max-width:100%;flex-wrap:wrap}
  .seg button{font:inherit;font-size:13px;padding:7px 11px;background:var(--card);border:0;border-right:1px solid var(--line);cursor:pointer;color:var(--ink)}
  .seg button:last-child{border-right:0}
  .seg button.active{background:var(--jade);color:#fff}
  .posgrid{display:grid;grid-template-columns:repeat(3,28px);grid-template-rows:repeat(3,28px);gap:5px}
  .posgrid button{border:1.5px solid var(--line);border-radius:6px;background:var(--card);cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
  .posgrid button:hover{border-color:#b9bfb6}
  .posgrid button.active{background:var(--jade);border-color:var(--jade);color:#fff}
  .swatches{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .swatch{width:25px;height:25px;border-radius:50%;border:1.5px solid rgba(0,0,0,.12);cursor:pointer;padding:0;position:relative}
  .swatch.active{box-shadow:0 0 0 2px var(--card),0 0 0 4px var(--jade)}
  .swatch.custom{display:inline-flex;align-items:center;justify-content:center;background:conic-gradient(red,orange,yellow,lime,aqua,blue,magenta,red);overflow:hidden}
  .chip{font:inherit;font-size:11.5px;padding:5px 11px;border:1.5px solid var(--line);border-radius:18px;background:var(--card);color:var(--ink);cursor:pointer}
  .chip:hover{border-color:#b9bfb6}
  .chip.active{background:var(--jade);border-color:var(--jade);color:#fff}
  .swatch.custom input{position:absolute;inset:-6px;width:200%;height:200%;opacity:0;cursor:pointer}
  input[type=range]{width:100%;accent-color:var(--jade)}
  .fontrow{display:flex;gap:8px;flex-wrap:wrap}
  .fbtn{font:inherit;font-size:12.5px;padding:9px 13px;border:1.5px solid var(--line);border-radius:9px;background:var(--card);cursor:pointer;color:var(--ink)}
  .sel{font:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);cursor:pointer;width:max-content}
  .fbtn:hover{border-color:#b9bfb6}
  .fbtn.reset{color:var(--muted)}
  .fontnames{font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all;line-height:1.5}
  .ce-add{display:flex;flex-wrap:wrap;gap:7px}
  .ce-add input{font:inherit;font-size:12.5px;padding:8px 9px;border:1.5px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink)}
  .ce-add input[type=date]{flex:1 1 130px}
  .ce-add input[type=text]{flex:1 1 110px;min-width:0}
  .ce-list{display:flex;flex-direction:column;gap:5px;margin-top:4px;max-height:150px;overflow:auto}
  .ce-item{display:flex;align-items:center;gap:8px;font-size:12px}
  .ce-date{flex:0 0 auto;font-variant-numeric:tabular-nums;font-weight:700;color:var(--muted);min-width:36px}
  .ce-name{flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ce-del{flex:0 0 auto;border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:5px;line-height:1}
  .ce-del:hover{color:var(--sun);background:#FBE6E2}
  .ce-empty{font-size:11px;color:var(--muted)}
  .divider{height:1px;background:var(--line);margin:2px -2px}
  .section{border-top:1px solid var(--line)}
  .section:first-child{border-top:0}
  .sec-head{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:0;cursor:pointer;padding:15px 2px;font-family:var(--ui);font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--ink)}
  .sec-head:hover{color:var(--jade)}
  .chev{width:7px;height:7px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(45deg);transition:transform .2s;margin-right:5px;margin-top:-3px}
  .sec-head:hover .chev{border-color:var(--jade)}
  .section.collapsed .chev{transform:rotate(-45deg)}
  .sec-body{display:flex;flex-direction:column;gap:18px;padding:2px 2px 18px}
  .section.collapsed .sec-body{display:none}
  .subhead{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:2px 0 2px 9px;border-left:2px solid var(--jade)}

  .preview{
    --ar:3/4;
    --cal-bg:rgba(255,255,255,.92); --cal-text:#232A2E;
    --cal-muted:rgba(35,42,46,.5); --cal-line:rgba(35,42,46,.2);
    --cal-font:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    --title-font:"Noto Serif TC",serif; --num-font:"Caveat","Noto Serif TC",serif; --cal-pill:rgba(35,42,46,.07); --fest-color:rgba(35,42,46,.82); --cal-holibg:rgba(35,42,46,.08); --custom-color:#0F8A6B;
    --cal-scale:1; --date-size:20px; --sub-size:9px; --pos-align:center; --pos-justify:center;
    background:var(--cal-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
    width:100%;max-width:500px;display:flex;aspect-ratio:var(--ar)
  }
  .preview.l-top,.preview.l-bottom{flex-direction:column}
  .preview.l-bottom{flex-direction:column-reverse}
  .preview.l-left{flex-direction:row;max-width:720px}
  .preview.l-right{flex-direction:row-reverse;max-width:720px}
  .preview.l-overlay{position:relative;max-width:540px;justify-content:var(--pos-justify);align-items:var(--pos-align);padding:20px}

  .photo{position:relative;overflow:hidden;cursor:pointer;background:#E6E9E3}
  .l-top .photo,.l-bottom .photo{width:100%;flex:1 1 auto;min-height:140px}
  .l-left .photo,.l-right .photo{flex:1 1 60%;align-self:stretch;min-height:0}
  .l-overlay .photo{position:absolute;inset:0;flex:none}
  .photo canvas{display:block;width:100%;height:100%}
  .photo .hint{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);background:rgba(35,42,46,.7);color:#fff;font-size:11px;padding:5px 11px;border-radius:20px;opacity:0;transition:.15s;pointer-events:none;white-space:nowrap}
  .photo:hover .hint{opacity:1}
  .photo.dragover{outline:3px dashed var(--jade);outline-offset:-7px}
  .capturing .hint{display:none}

  .cal{font-family:var(--cal-font);color:var(--cal-text);background:var(--cal-bg);flex:0 0 auto;display:flex;flex-direction:column;gap:.25em;font-size:calc(13px*var(--cal-scale));padding:1em 1.1em 1.1em}
  .l-left .cal,.l-right .cal{flex:1 1 44%;justify-content:var(--pos-align)}
  .l-overlay .cal{flex:0 0 auto;width:min(440px,82%);border-radius:12px;padding:1.1em 1.3em 1.2em;box-shadow:0 8px 30px rgba(0,0,0,.18);position:relative;z-index:1}
  .cal-head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--cal-line);padding:0 .1em .35em;margin-bottom:.15em}
  .cal-month{font-family:var(--title-font);font-weight:600;font-size:1.95em;letter-spacing:.02em;color:var(--cal-text)}
  .cal-year{font-family:var(--num-font);font-size:1.55em;color:var(--cal-muted);letter-spacing:.02em}
  .gcal{display:grid;grid-template-columns:repeat(7,1fr);column-gap:.3em;row-gap:0}
  .gwk{text-align:center;font-size:.72em;font-weight:500;letter-spacing:.12em;color:var(--cal-muted);text-transform:uppercase;padding:.15em 0 .45em;border-bottom:1px solid var(--cal-line);margin-bottom:.2em}
  .gwk.sun{color:var(--sun)} .gwk.sat{color:var(--sat)}
  .gc{min-height:3.2em;border-bottom:1px solid var(--cal-line);display:flex;flex-direction:column;padding:.2em .28em 0}
  .gc.other{opacity:.13}
  .gc.holiday{background:var(--cal-holibg);border-radius:.3em}
  .gnum{font-family:var(--num-font);font-size:calc(var(--date-size)*var(--cal-scale));line-height:1;color:var(--cal-text)}
  .gc.sun .gnum{color:var(--sun)} .gc.sat .gnum{color:var(--sat)} .gc.holiday .gnum{color:var(--sun)}
  .gc.today{outline:2px solid var(--jade);outline-offset:-2px;border-radius:.3em}
  .glun{font-size:calc(var(--sub-size)*var(--cal-scale));line-height:1.2;color:var(--cal-muted);margin-top:.12em}
  .glun.term{color:var(--jade);font-weight:600}
  .ghol{font-size:calc(var(--sub-size)*var(--cal-scale));line-height:1.25;margin-top:.12em;white-space:normal;overflow-wrap:anywhere;word-break:break-word;font-weight:500}
  .ghol.tw{color:var(--sun)} .ghol.trad{color:var(--fest-color)}
  .gpill{font-size:calc(var(--sub-size)*var(--cal-scale));line-height:1.2;margin-top:.16em;padding:.1em .42em;border-radius:.35em;background:var(--cal-pill);color:var(--fest-color);width:fit-content;max-width:100%;white-space:normal;overflow-wrap:anywhere;word-break:break-word}
  .gpill.custom{color:var(--custom-color)}
  .gwrite{flex:1;min-height:.25em}

  @media (max-width:1080px){
    body{flex-wrap:wrap}
    .sidebar{order:1} .center{order:2;flex:1 1 60%}
    .controls{order:3;width:100%;flex:1 1 100%;height:auto;position:static;border-left:0;border-top:1px solid var(--line);flex-direction:column;gap:0;align-items:stretch}
    .sec-body{flex-direction:row;flex-wrap:wrap;gap:16px 26px;align-items:flex-start}
    .controls .btn{width:auto;min-width:150px;margin-top:10px}
    input[type=range]{width:160px}
  }
  @media (max-width:780px){
    .sidebar{width:100%;flex:none;height:auto;position:static;flex-direction:row;align-items:center;gap:14px;padding:14px 16px;overflow-x:auto}
    .brand .year{font-size:30px} .months{display:flex;gap:6px;flex:1} .month-btn{padding:8px 10px;white-space:nowrap} .sidebar .tip{display:none}
    .center{padding:20px 14px}
    .preview.l-left,.preview.l-right{flex-direction:column;max-width:500px}
    .preview.l-left .photo,.preview.l-right .photo{flex:1 1 auto}
    .preview.l-left .cal,.preview.l-right .cal{flex:0 0 auto}
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><div class="eyebrow">Photo Calendar</div><div class="year" id="brandYear">2026</div><div style="font-size:10px;letter-spacing:.12em;color:var(--sidebar-muted);margin-top:7px">v2.0.1</div></div>
    <div class="year-switch" id="yearSwitch">
      <button type="button" class="year-tab active" data-y="2026">2026</button>
      <button type="button" class="year-tab" data-y="2027">2027</button>
    </div>
    <nav class="months" id="months" aria-label="選擇月份"></nav>
    <p class="tip">點照片區各區塊（或拖曳）上傳／更換當月照片，橘點＝已有照片。可放 1–4 張做方格／梯形拼貼。右側面板調整版面與設計。</p>
  </aside>

  <main class="center">
    <div class="stage">
      <div class="preview l-top" id="preview">
        <div class="photo" id="photo">
          <canvas id="pcanvas"></canvas>
          <span class="hint">點空白處上傳 · 拖曳移動 · 滾輪縮放</span>
        </div>
        <div class="cal" id="cal"></div>
      </div>
    </div>
  </main>

  <aside class="controls">
    <div class="section collapsed">
      <button class="sec-head" type="button"><span>照片排版</span><i class="chev"></i></button>
      <div class="sec-body">
        <div class="grp">
          <span class="glabel">整體呈現 <small>(照片為主)</small></span>
          <div class="layout-row" id="layouts"></div>
        </div>
        <div class="grp">
          <span class="glabel">畫面比例</span>
          <div class="seg" id="aspectSeg">
            <button data-ar="3/4" class="active">3:4</button>
            <button data-ar="1/1">1:1</button>
            <button data-ar="4/3">4:3</button>
            <button data-ar="16/9">16:9</button>
            <button data-ar="9/16">9:16</button>
          </div>
        </div>
        <div class="subhead">拼貼</div>
        <div class="grp">
          <span class="glabel">張數</span>
          <div class="seg" id="countSeg">
            <button data-n="1" class="active">1</button>
            <button data-n="2">2</button>
            <button data-n="3">3</button>
            <button data-n="4">4</button>
          </div>
        </div>
        <div class="grp">
          <span class="glabel">樣式</span>
          <div class="seg" id="styleSeg">
            <button data-s="grid" class="active">方格</button>
            <button data-s="trap">梯形</button>
          </div>
        </div>
      </div>
    </div>

    <div class="section collapsed">
      <button class="sec-head" type="button"><span>月曆設計</span><i class="chev"></i></button>
      <div class="sec-body">
        <div class="grp">
          <span class="glabel">位置 <small>(上下：滿版／左右圖適用)</small></span>
          <div class="seg" id="posSeg">
            <button data-v="T">靠上</button>
            <button data-v="C" class="active">置中</button>
            <button data-v="B">靠下</button>
          </div>
        </div>
        <div class="grp">
          <span class="glabel">縮放 <em id="scaleVal">100%</em></span>
          <input type="range" id="scale" min="75" max="140" value="100">
        </div>
        <div class="grp font-grp">
          <span class="glabel">字體 <small>(缺字用輔助字體補)</small></span>
          <div class="fontrow">
            <label class="fbtn">主字體<input type="file" id="fontMain" accept=".ttf,.otf,.woff,.woff2" hidden></label>
            <label class="fbtn">輔助字體<input type="file" id="fontFb" accept=".ttf,.otf,.woff,.woff2" hidden></label>
            <button class="fbtn reset" id="fontReset">重設</button>
          </div>
          <div class="fontnames" id="fontNames">目前：預設黑體</div>
        </div>
        <div class="grp">
          <span class="glabel">日期大小</span>
          <select class="sel" id="dateSizeSel"></select>
        </div>
        <div class="grp">
          <span class="glabel">節日／節氣大小</span>
          <select class="sel" id="subSizeSel"></select>
        </div>
        <div class="grp">
          <span class="glabel">面板底色</span>
          <div class="swatches" id="bgSwatches">
            <button class="swatch active" data-c="#FFFFFF" style="background:#FFFFFF" title="白"></button>
            <button class="swatch" data-c="#FAF6EE" style="background:#FAF6EE" title="奶油"></button>
            <button class="swatch" data-c="#ECEAE4" style="background:#ECEAE4" title="米灰"></button>
            <button class="swatch" data-c="#FCE3EC" style="background:#FCE3EC" title="粉"></button>
            <button class="swatch" data-c="#DCE7EE" style="background:#DCE7EE" title="天藍"></button>
            <button class="swatch" data-c="#DCE7DF" style="background:#DCE7DF" title="抹茶"></button>
            <button class="swatch" data-c="#1C1C1E" style="background:#1C1C1E" data-dark="1" title="黑"></button>
            <button class="swatch" data-c="#20302A" style="background:#20302A" data-dark="1" title="墨綠"></button>
            <button class="swatch" data-c="#1E2A3A" style="background:#1E2A3A" data-dark="1" title="墨藍"></button>
            <span class="swatch custom" title="自訂顏色"><input type="color" id="bgCustom" value="#ffffff"></span>
          </div>
        </div>
        <div class="grp" id="opGrp">
          <span class="glabel">透明度 <em id="opVal">92%</em> <small id="opNote">（僅滿版背景）</small></span>
          <input type="range" id="opacity" min="0" max="100" value="92">
        </div>
        <div class="grp">
          <span class="glabel">文字顏色</span>
          <div class="swatches" id="txtSwatches">
            <button class="swatch active" data-c="#232A2E" style="background:#232A2E" title="墨黑"></button>
            <button class="swatch" data-c="#5A615C" style="background:#5A615C" title="灰"></button>
            <button class="swatch" data-c="#FFFFFF" style="background:#FFFFFF" title="白"></button>

  function targetFromEvent(e){var rect=photoEl.getBoundingClientRect();var px=(e.clientX-rect.left)/rect.width,py=(e.clientY-rect.top)/rect.height;return regionAt(clamp01(px),clamp01(py));}
  var drag=null;
  photoEl.addEventListener("mousedown",function(e){
    if(e.button!==0)return;
    var i=targetFromEvent(e),url=(images[current]||[])[i];
    drag={i:i,sx:e.clientX,sy:e.clientY,moved:false,has:!!url};
    if(url&&cache[url]&&cache[url].naturalWidth){
      var off=getOffset(current,i),d=regionDestPx(i,photoEl.clientWidth,photoEl.clientHeight),p=coverParams(cache[url].naturalWidth,cache[url].naturalHeight,d.w,d.h,off.zoom||1);
      drag.sw=p.sw;drag.sh=p.sh;drag.slackX=p.slackX;drag.slackY=p.slackY;drag.w=d.w;drag.h=d.h;drag.ox=off.ox;drag.oy=off.oy;
      photoEl.style.cursor="grabbing";
    }
    e.preventDefault();
  });
  window.addEventListener("mousemove",function(e){
    if(!drag||!drag.has)return;
    var dx=e.clientX-drag.sx,dy=e.clientY-drag.sy;
    if(!drag.moved&&Math.sqrt(dx*dx+dy*dy)>4)drag.moved=true;
    if(!drag.moved)return;
    var off=ensureOffset(current,drag.i);
    if(drag.slackX>0.5)off.ox=clamp(drag.ox-2*dx*(drag.sw/drag.w)/drag.slackX,-1,1);
    if(drag.slackY>0.5)off.oy=clamp(drag.oy-2*dy*(drag.sh/drag.h)/drag.slackY,-1,1);
    scheduleDraw();
  });
  window.addEventListener("mouseup",function(){
    if(!drag)return;
    var wasClick=!drag.moved,i=drag.i;photoEl.style.cursor="";drag=null;
    if(wasClick){uploadTarget=i;fileInput.click();}
  });
  photoEl.addEventListener("mousemove",function(e){
    if(drag)return;
    var url=(images[current]||[])[targetFromEvent(e)];
    photoEl.style.cursor=url?"grab":"pointer";
  });
  photoEl.addEventListener("wheel",function(e){
    var i=targetFromEvent(e),url=(images[current]||[])[i];
    if(!url)return;
    e.preventDefault();
    var off=ensureOffset(current,i);
    off.zoom=clamp((off.zoom||1)*(e.deltaY<0?1.1:1/1.1),1,5);
    scheduleDraw();
  },{passive:false});
  fileInput.addEventListener("change",function(e){loadFile(e.target.files[0]);fileInput.value="";});
  ["dragenter","dragover"].forEach(function(ev){photoEl.addEventListener(ev,function(e){e.preventDefault();photoEl.classList.add("dragover");});});
  ["dragleave","drop"].forEach(function(ev){photoEl.addEventListener(ev,function(e){e.preventDefault();photoEl.classList.remove("dragover");});});
  photoEl.addEventListener("drop",function(e){if(e.dataTransfer.files.length){uploadTarget=targetFromEvent(e);loadFile(e.dataTransfer.files[0]);}});

  /* ---------- panel controls ---------- */
  function segActivate(container,btn){[].forEach.call(container.children,function(c){c.classList.remove("active");});btn.classList.add("active");}
  $("aspectSeg").addEventListener("click",function(e){var b=e.target.closest("button");if(!b||b.disabled)return;segActivate(this,b);theme.ar=b.dataset.ar;applyTheme();scheduleDraw();});
  $("countSeg").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;segActivate(this,b);collageCount=+b.dataset.n;scheduleDraw();syncMonths();});
  $("styleSeg").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;segActivate(this,b);collageStyle=b.dataset.s;scheduleDraw();});
  $("posSeg").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;segActivate(this,b);theme.posV=b.dataset.v;applyTheme();});
  $("scale").addEventListener("input",function(e){theme.scale=(+e.target.value)/100;$("scaleVal").textContent=e.target.value+"%";applyTheme();});
  function fillSizes(sel,val){var h="";for(var i=9;i<=28;i++)h+='<option value="'+i+'"'+(i===val?" selected":"")+'>'+i+'px</option>';sel.innerHTML=h;}
  fillSizes($("dateSizeSel"),theme.dateSize);fillSizes($("subSizeSel"),theme.subSize);
  $("dateSizeSel").addEventListener("change",function(e){theme.dateSize=+e.target.value;applyTheme();});
  $("subSizeSel").addEventListener("change",function(e){theme.subSize=+e.target.value;applyTheme();});

  function setActiveSwatch(container,hex){[].forEach.call(container.querySelectorAll(".swatch"),function(s){s.classList.toggle("active",(s.dataset.c||"").toUpperCase()===hex.toUpperCase());});}
  function autoText(bgIsDark){var d=lum(theme.txt)<0.5;if(bgIsDark&&d){theme.txt="#F5EFE2";setActiveSwatch($("txtSwatches"),theme.txt);}else if(!bgIsDark&&!d){theme.txt="#232A2E";setActiveSwatch($("txtSwatches"),theme.txt);}}
  $("bgSwatches").addEventListener("click",function(e){var b=e.target.closest(".swatch");if(!b||!b.dataset.c)return;theme.bg=b.dataset.c;autoText(b.dataset.dark==="1");setActiveSwatch(this,theme.bg);applyTheme();});
  $("bgCustom").addEventListener("input",function(e){theme.bg=e.target.value;[].forEach.call($("bgSwatches").querySelectorAll(".swatch:not(.custom)"),function(s){s.classList.remove("active");});autoText(lum(theme.bg)<0.5);applyTheme();});
  $("txtSwatches").addEventListener("click",function(e){var b=e.target.closest(".swatch");if(!b||!b.dataset.c)return;theme.txt=b.dataset.c;setActiveSwatch(this,theme.txt);applyTheme();});
  $("txtCustom").addEventListener("input",function(e){theme.txt=e.target.value;[].forEach.call($("txtSwatches").querySelectorAll(".swatch:not(.custom)"),function(s){s.classList.remove("active");});applyTheme();});
  function clearFest(){[].forEach.call($("festSwatches").querySelectorAll(".swatch:not(.custom),.chip"),function(s){s.classList.remove("active");});}
  $("festSwatches").addEventListener("click",function(e){var b=e.target.closest(".swatch,.chip");if(!b||!b.dataset.c)return;clearFest();b.classList.add("active");theme.fest=b.dataset.c==="auto"?"auto":b.dataset.c;applyTheme();});
  $("festCustom").addEventListener("input",function(e){theme.fest=e.target.value;clearFest();applyTheme();});
  function updateFestUI(){var sw=$("festSwatches");sw.style.opacity=showFest?"1":".4";sw.style.pointerEvents=showFest?"":"none";}
  $("festShowSeg").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;segActivate(this,b);showFest=b.dataset.s==="1";updateFestUI();calEl.innerHTML=buildCalendar(current);});
  $("lunShowSeg").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;segActivate(this,b);showLun=b.dataset.s==="1";calEl.innerHTML=buildCalendar(current);});

  function renderCustomList(){
    var box=$("ceList"),keys=Object.keys(customEvents);
    if(!keys.length){box.innerHTML='<div class="ce-empty">尚未新增</div>';return;}
    keys.sort(function(a,b){var pa=a.split("-"),pb=b.split("-");return (+pa[0])-(+pb[0])||(+pa[1])-(+pb[1]);});
    var html="";
    keys.forEach(function(k){var p=k.split("-");customEvents[k].forEach(function(n,i){
      html+='<div class="ce-item"><span class="ce-date">'+p[0]+'/'+p[1]+'</span><span class="ce-name">'+esc(n)+'</span><button class="ce-del" data-k="'+k+'" data-i="'+i+'" aria-label="刪除">✕</button></div>';
    });});
    box.innerHTML=html;
  }
  function addCustom(){
    var d=$("ceDate").value,name=($("ceName").value||"").trim();
    if(!d||!name)return;
    var p=d.split("-"),key=(+p[1])+"-"+(+p[2]);
    if(!customEvents[key])customEvents[key]=[];
    customEvents[key].push(name);
    saveCustom();$("ceName").value="";
    renderCustomList();calEl.innerHTML=buildCalendar(current);
  }
  function removeCustom(key,idx){
    if(!customEvents[key])return;
    customEvents[key].splice(idx,1);
    if(!customEvents[key].length)delete customEvents[key];
    saveCustom();renderCustomList();calEl.innerHTML=buildCalendar(current);
  }
  $("ceAdd").addEventListener("click",addCustom);
  $("ceName").addEventListener("keydown",function(e){if(e.key==="Enter")addCustom();});
  $("ceList").addEventListener("click",function(e){var b=e.target.closest(".ce-del");if(!b)return;removeCustom(b.dataset.k,+b.dataset.i);});
  $("ceColorSwatches").addEventListener("click",function(e){var b=e.target.closest(".swatch");if(!b||!b.dataset.c)return;theme.customColor=b.dataset.c;setActiveSwatch(this,theme.customColor);applyTheme();});
  $("ceColorCustom").addEventListener("input",function(e){theme.customColor=e.target.value;[].forEach.call($("ceColorSwatches").querySelectorAll(".swatch:not(.custom)"),function(s){s.classList.remove("active");});applyTheme();});
  $("opacity").addEventListener("input",function(e){theme.opacity=(+e.target.value)/100;$("opVal").textContent=e.target.value+"%";applyTheme();});

  /* ---------- fonts ---------- */
  function loadFont(file,family,cb){
    file.arrayBuffer().then(function(buf){var ff=new FontFace(family,buf);return ff.load();})
      .then(function(ff){document.fonts.add(ff);cb&&cb();})
      .catch(function(err){alert("字體載入失敗:"+(err&&err.message?err.message:err));fontLabel();});
  }
  function fontLabel(){if(!theme.fontMain&&!theme.fontFb){$("fontNames").textContent="目前：預設黑體";return;}var t="主字體："+(theme.fontMainName||"預設黑體");if(theme.fontFb)t+="　輔助："+(theme.fontFbName||"");$("fontNames").textContent=t;}
  $("fontMain").addEventListener("change",function(e){var f=e.target.files[0];if(!f)return;var name="UserMain_"+Date.now();$("fontNames").textContent="主字體載入中…";loadFont(f,name,function(){theme.fontMain=name;theme.fontMainName=f.name.replace(/\.[^.]+$/,"");applyTheme();fontLabel();});e.target.value="";});
  $("fontFb").addEventListener("change",function(e){var f=e.target.files[0];if(!f)return;var name="UserFb_"+Date.now();$("fontNames").textContent="輔助字體載入中…";loadFont(f,name,function(){theme.fontFb=name;theme.fontFbName=f.name.replace(/\.[^.]+$/,"");applyTheme();fontLabel();});e.target.value="";});
  $("fontReset").addEventListener("click",function(){theme.fontMain=null;theme.fontFb=null;theme.fontMainName="";theme.fontFbName="";applyTheme();fontLabel();});

  /* ---------- export ---------- */
  function pad2(n){return(n<10?"0":"")+n;}
  function nextFrame(){return new Promise(function(r){requestAnimationFrame(function(){r();});});}
  function fontsReady(){return document.fonts&&document.fonts.ready?document.fonts.ready:Promise.resolve();}

  function exportPNG(){
    var btn=$("pngBtn");
    if(typeof html2canvas==="undefined"){alert("PNG 函式庫尚未載入，請確認網路後重試。");return;}
    var old=btn.textContent;btn.textContent="輸出中…";btn.disabled=true;
    previewEl.classList.add("capturing");drawCollage(true);
    fontsReady().then(nextFrame).then(function(){
      return html2canvas(previewEl,{scale:2,backgroundColor:null,useCORS:true,logging:false});
    }).then(function(canvas){
      var a=document.createElement("a");a.download=YEAR+"-"+pad2(current+1)+"_"+MN[current]+".png";a.href=canvas.toDataURL("image/png");document.body.appendChild(a);a.click();document.body.removeChild(a);
    }).catch(function(err){alert("輸出失敗:"+(err&&err.message?err.message:err));})
    .then(function(){previewEl.classList.remove("capturing");btn.textContent=old;btn.disabled=false;drawCollage(false);});
  }
  $("pngBtn").addEventListener("click",exportPNG);

  function exportAll(){
    var btn=$("pngAllBtn");
    if(typeof html2canvas==="undefined"){alert("PNG 函式庫尚未載入，請確認網路後重試。");return;}
    if(typeof JSZip==="undefined"){alert("ZIP 函式庫尚未載入，請確認網路後重試。");return;}
    var old=btn.textContent,saved=current;
    btn.disabled=true;$("pngBtn").disabled=true;previewEl.classList.add("capturing");
    var zip=new JSZip(),m=0;
    function step(){
      if(m>=12){
        zip.generateAsync({type:"blob"}).then(function(content){
          var a=document.createElement("a");a.href=URL.createObjectURL(content);a.download=YEAR+"-月曆-全年.zip";document.body.appendChild(a);a.click();
          setTimeout(function(){URL.revokeObjectURL(a.href);document.body.removeChild(a);},1500);
        }).catch(function(err){alert("ZIP 產生失敗:"+(err&&err.message?err.message:err));})
        .then(function(){previewEl.classList.remove("capturing");current=saved;render();btn.textContent=old;btn.disabled=false;$("pngBtn").disabled=false;});
        return;
      }
      btn.textContent="輸出中 "+(m+1)+"/12";
      current=m;previewEl.className="preview "+layout;applyTheme();calEl.innerHTML=buildCalendar(m);syncMonths();
      ensureDecoded(m).then(nextFrame).then(function(){drawCollage(true);return fontsReady();}).then(nextFrame).then(function(){
        return html2canvas(previewEl,{scale:2,backgroundColor:null,useCORS:true,logging:false});
      }).then(function(canvas){
        return new Promise(function(res){canvas.toBlob(function(blob){zip.file(YEAR+"-"+pad2(m+1)+"_"+MN[m]+".png",blob);res();},"image/png");});
      }).then(function(){m++;step();}).catch(function(err){
        alert("第 "+(m+1)+" 個月輸出失敗:"+(err&&err.message?err.message:err));
        previewEl.classList.remove("capturing");current=saved;render();btn.textContent=old;btn.disabled=false;$("pngBtn").disabled=false;
      });
    }
    step();
  }
  $("pngAllBtn").addEventListener("click",exportAll);

  [].forEach.call(document.querySelectorAll(".sec-head"),function(h){h.addEventListener("click",function(){h.parentNode.classList.toggle("collapsed");});});
  $("yearSwitch").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;setYear(+b.dataset.y);});
  loadCustom();
  $("brandYear").textContent=YEAR;
  [].forEach.call($("yearSwitch").children,function(b){b.classList.toggle("active",+b.dataset.y===YEAR);});
  $("ceDate").min=YEAR+"-01-01";$("ceDate").max=YEAR+"-12-31";$("ceDate").value=YEAR+"-"+pad2(current+1)+"-01";
  renderCustomList();
  applyTheme();fontLabel();updateAspectAvail();updateFestUI();render();
})();
</script>
</body>
</html>
